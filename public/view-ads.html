<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Ads | AdRewards</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/supabase-config.js"></script>
</head>

<body>
    <div class="container">
        <div class="app-view">
            <!-- Top Nav -->
            <div class="top-nav">
                <div class="logo text-gradient">AdRewards</div>
                <div class="nav-actions">
                    <a href="/dashboard.html">← Back to Dashboard</a>
                </div>
            </div>

            <div class="text-center">
                <h2 class="mb-1" style="font-size: 1.5rem;">Viewing Advertisement</h2>
                <p class="text-secondary mb-4" style="font-size: 0.95rem;">Please wait for the timer to complete to earn
                    ₦40.</p>
            </div>

            <div class="timer-text text-gradient" id="timer-display">10</div>

            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>

            <div class="ad-container">
                <iframe id="ad-frame" src="/ad-unit.html" frameborder="0" width="300" height="250" scrolling="no"
                    style="background: transparent;"></iframe>
            </div>

            <div id="action-area" class="text-center hidden" style="margin-top: 1rem;">
                <h3 class="success-text mb-1" style="font-size: 1.1rem; color: var(--primary-color);">Ad viewed
                    successfully!</h3>
                <p id="reward-message" class="mb-4 text-secondary" style="font-size: 0.95rem;"></p>
                <div class="grid grid-cols-2">
                    <button id="next-ad-btn" class="btn btn-primary">View Next Ad</button>
                    <a href="/dashboard.html" class="btn btn-outline"
                        style="line-height: normal; display: flex; align-items: center; justify-content: center;">Go to
                        Dashboard</a>
                </div>
            </div>
        </div>
    </div>
    <script src="/js/ads.js"></script>
</body>

</html>
