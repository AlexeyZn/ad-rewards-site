<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdRewards | Earn by Viewing Ads</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/supabase-config.js"></script>
</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-box">
            <div class="text-center mb-4">
                <div class="logo text-gradient" style="font-size: 1.75rem; font-weight: 800; margin-bottom: 0.5rem;">
                    AdRewards</div>
                <h1 id="auth-title" style="font-size: 1.25rem;">Welcome Back</h1>
                <p class="text-secondary" id="auth-subtitle" style="font-size: 0.9rem;">Login to continue earning</p>
            </div>

            <!-- Login Form -->
            <div id="login-form-container">
                <form id="login-form">
                    <div class="form-group">
                        <label for="login-email">Email</label>
                        <input type="email" id="login-email" class="form-control" placeholder="Enter your email"
                            required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" class="form-control"
                            placeholder="Enter your password" required>
                    </div>
                    <div id="login-error" class="error-text text-center"></div>
                    <button type="submit" class="btn btn-primary mt-2">Login</button>

                    <p class="text-center mt-4" style="font-size: 0.9rem;">
                        <span class="text-secondary">Don't have an account?</span>
                        <a href="#" id="show-register"
                            style="color: var(--primary-color); text-decoration: none; font-weight: 600;">Sign up</a>
                    </p>
                </form>
            </div>

            <!-- Register Form -->
            <div id="register-form-container" class="hidden">
                <form id="register-form">
                    <div class="form-group">
                        <label for="reg-username">Username</label>
                        <input type="text" id="reg-username" class="form-control" placeholder="Choose a username"
                            required>
                    </div>
                    <div class="form-group">
                        <label for="reg-email">Email</label>
                        <input type="email" id="reg-email" class="form-control" placeholder="Enter your email address"
                            required>
                    </div>
                    <div class="form-group">
                        <label for="reg-password">Password</label>
                        <input type="password" id="reg-password" class="form-control" placeholder="Create a password"
                            required>
                    </div>
                    <div class="form-group">
                        <label for="reg-referred">Referral Code (Optional)</label>
                        <input type="text" id="reg-referred" class="form-control" placeholder="Enter referral code">
                    </div>
                    <div id="reg-error" class="error-text text-center"></div>
                    <button type="submit" class="btn btn-primary mt-2">Create Account</button>

                    <p class="text-center mt-4" style="font-size: 0.9rem;">
                        <span class="text-secondary">Already have an account?</span>
                        <a href="#" id="show-login"
                            style="color: var(--primary-color); text-decoration: none; font-weight: 600;">Login</a>
                    </p>
                </form>
            </div>
        </div>
    </div>
    <footer class="app-footer">
        <div class="footer-content">
            <div class="footer-brand">
                <div class="logo text-gradient">AdRewards</div>
                <p>Earn money effortlessly by viewing ads.</p>
            </div>
            <div class="footer-links">
                <a href="#">About Us</a>
                <a href="#">Terms of Service</a>
                <a href="#">Privacy Policy</a>
                <a href="#">Contact</a>
            </div>
        </div>
        <div class="footer-bottom">
            &copy; 2026 AdRewards. All rights reserved.
        </div>
    </footer>
    <script src="/js/auth.js"></script>
</body>

</html>
