<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdRewards | Earn by Viewing Ads</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/supabase-config.js"></script>
</head>

<body>
    <div class="auth-wrapper">
        <div class="glass-card auth-card">
            <h1 class="text-center text-gradient" id="auth-title">Welcome Back</h1>
            <p class="text-center text-secondary mb-4" id="auth-subtitle">Login to continue earning</p>

            <!-- Login Form -->
            <div id="login-form-container">
                <form id="login-form">
                    <div class="form-group">
                        <label for="login-email">Email</label>
                        <input type="email" id="login-email" class="form-control" placeholder="Enter your email"
                            required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" class="form-control"
                            placeholder="Enter your password" required>
                    </div>
                    <div id="login-error" class="error-text mb-2 text-center"></div>
                    <button type="submit" class="btn btn-primary">Login</button>

                    <p class="text-center mt-4">
                        <span class="text-secondary">Don't have an account?</span>
                        <a href="#" id="show-register" style="color: var(--primary-color); text-decoration: none;">Sign
                            up</a>
                    </p>
                </form>
            </div>

            <!-- Register Form -->
            <div id="register-form-container" class="hidden">
                <form id="register-form">
                    <div class="form-group">
                        <label for="reg-username">Username</label>
                        <input type="text" id="reg-username" class="form-control" placeholder="Choose a username"
                            required>
                    </div>
                    <div class="form-group">
                        <label for="reg-email">Email</label>
                        <input type="email" id="reg-email" class="form-control" placeholder="Enter your email address"
                            required>
                    </div>
                    <div class="form-group">
                        <label for="reg-password">Password</label>
                        <input type="password" id="reg-password" class="form-control" placeholder="Create a password"
                            required>
                    </div>
                    <div class="form-group">
                        <label for="reg-referred">Referral Code (Optional)</label>
                        <input type="text" id="reg-referred" class="form-control" placeholder="Enter referral code">
                    </div>
                    <div id="reg-error" class="error-text mb-2 text-center"></div>
                    <button type="submit" class="btn btn-primary">Create Account</button>

                    <p class="text-center mt-4">
                        <span class="text-secondary">Already have an account?</span>
                        <a href="#" id="show-login"
                            style="color: var(--primary-color); text-decoration: none;">Login</a>
                    </p>
                </form>
            </div>
        </div>
    </div>

    <script src="/js/auth.js"></script>
</body>

</html>
